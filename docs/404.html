<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splitwise Clone</title>
    <script>
      // SPA Redirect for GitHub Pages
      // Capture the redirect URL and redirect to the SPA with the proper route
      const redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replace(redirect);
      }
    </script>
    <script type="module" crossorigin src="/Splitwise/assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="/Splitwise/assets/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Store the redirect path in sessionStorage for the app to use
      sessionStorage.redirect = location.href;
    </script>
  </body>
</html>
